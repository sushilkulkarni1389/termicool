name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    
    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Add Rust Universal Mac Targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build CLI binary (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri
          mkdir -p binaries
          touch binaries/termicool-cli-aarch64-apple-darwin
          touch binaries/termicool-cli-x86_64-apple-darwin
          touch binaries/termicool-cli-universal-apple-darwin
          cargo build --bin termicool-cli --release --target aarch64-apple-darwin
          cargo build --bin termicool-cli --release --target x86_64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/aarch64-apple-darwin/release/termicool-cli \
            target/x86_64-apple-darwin/release/termicool-cli \
            -output target/universal-apple-darwin/release/termicool-cli
          cp target/universal-apple-darwin/release/termicool-cli binaries/termicool-cli-universal-apple-darwin
          cp target/aarch64-apple-darwin/release/termicool-cli binaries/termicool-cli-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/termicool-cli binaries/termicool-cli-x86_64-apple-darwin

      - name: Build CLI binary (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd src-tauri
          mkdir -p binaries
          touch binaries/termicool-cli-x86_64-unknown-linux-gnu
          cargo build --bin termicool-cli --release
          cp target/release/termicool-cli binaries/termicool-cli-x86_64-unknown-linux-gnu

      - name: Build CLI binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cd src-tauri
          New-Item -ItemType Directory -Force -Path binaries
          New-Item -ItemType File -Force -Path "binaries/termicool-cli-x86_64-pc-windows-msvc.exe"
          cargo build --bin termicool-cli --release
          cp target/release/termicool-cli.exe "binaries/termicool-cli-x86_64-pc-windows-msvc.exe"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TermiCool ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin --verbose' || '--verbose' }}